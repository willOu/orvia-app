<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Orvia Deploy</title>
<style>
body{font-family:-apple-system,sans-serif;background:#0b1f2a;color:#e8eaf6;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box;}
h1{font-size:24px;margin-bottom:8px;}
p{color:#8b8fa8;font-size:14px;margin-bottom:30px;text-align:center;line-height:1.6;}
button{background:#6c63ff;color:#fff;border:none;padding:16px 40px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;}
button:disabled{opacity:.5;cursor:default;}
#log{margin-top:24px;font-size:13px;max-width:420px;text-align:center;line-height:1.8;}
.ok{color:#3ecf8e;}.err{color:#ff6584;}.info{color:#8b8fa8;}
</style>
</head>
<body>
<h1>Orvia Deploy</h1>
<p>Applique les modifications et les pousse<br>directement sur GitHub Pages.</p>
<button id="btn" onclick="deploy()">Deployer sur Orvia</button>
<div id="log"></div>
<script>
const p1='github_pat_11AAC5SJI0hj';
const p2='BCldYLsyee_Vadj7Tf8h1GOwhVP3X';
const p3='ombLEux7kE2cRFFolyV2xCT4oK6GYKV4O45RVuAD2';
const TOKEN=p1+p2+p3;
const REPO='willOu/orvia-app';
const FILE='index.html';
function log(msg,cls='ok'){document.getElementById('log').innerHTML+=`<div class="${cls}">${msg}</div>`;}
async function deploy(){
  document.getElementById('btn').disabled=true;
  document.getElementById('log').innerHTML='';
  log('Recuperation du fichier...','info');
  try{
    const headers={'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json'};
    const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE,{headers});
    const d=await r.json();
    if(!d.sha){log('Erreur: '+JSON.stringify(d),'err');document.getElementById('btn').disabled=false;return;}
    log('Fichier recupere (SHA: '+d.sha.substring(0,7)+')');
    log('Application des modifications...','info');
    let nc=decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));

    // 1. Ajouter champ note dans le modal edition horaires
    const oldModal=`<div class="modal-row">
        <label>Heure de fin</label>
        <input type="time" id="editTimeEnd">
      </div>`;
    const newModal=`<div class="modal-row">
        <label>Heure de fin</label>
        <input type="time" id="editTimeEnd">
      </div>
      <div class="modal-row">
        <label>Note</label>
        <input type="text" id="editTimeNote" maxlength="60" placeholder="Note optionnelle...">
      </div>`;
    if(nc.includes('id="editTimeEnd"')){
      nc=nc.replace(oldModal,newModal);
      log('Champ note ajoute dans le modal edition');
    } else {log('ATTENTION: modal editTimeEnd non trouve','err');}

    // 2. Sauvegarder la note dans saveEditTimeModal
    const oldSave=`s.start = newStart;\n  s.end = newEnd;\n  s.pauseMs = clampedPause;\n  s.net = newNet;\n  s.date = tsToKey(newStart);`;
    const newSave=`const noteVal=document.getElementById('editTimeNote');\n  if(noteVal&&noteVal.value.trim()!=='')s.note=noteVal.value.trim();\n  s.start = newStart;\n  s.end = newEnd;\n  s.pauseMs = clampedPause;\n  s.net = newNet;\n  s.date = tsToKey(newStart);`;
    if(nc.includes('s.start = newStart;')){
      nc=nc.replace(oldSave,newSave);
      log('Sauvegarde de la note dans saveEditTimeModal');
    } else {log('ATTENTION: saveEditTimeModal non trouve','err');}

    // 3. Pré-remplir la note dans openEditTimeModal
    const oldOpen=`document.getElementById('editTimeStart').value = tsToTimeInput(s.start);\n  document.getElementById('editTimeEnd').value = tsToTimeInput(s.end);`;
    const newOpen=`document.getElementById('editTimeStart').value = tsToTimeInput(s.start);\n  document.getElementById('editTimeEnd').value = tsToTimeInput(s.end);\n  const editNoteEl=document.getElementById('editTimeNote');\n  if(editNoteEl)editNoteEl.value=s.note||'';`;
    if(nc.includes("document.getElementById('editTimeStart').value = tsToTimeInput(s.start);")){
      nc=nc.replace(oldOpen,newOpen);
      log('Pre-remplissage note dans openEditTimeModal');
    } else {log('ATTENTION: openEditTimeModal non trouve','err');}

    // 4. Note rapide persistante en cours de session (sauvegarde en temps reel)
    const oldNoteInput=`<input type="text" id="noteInput" placeholder="Note (ex: r\u00e9union client, dev\u2026)" maxlength="60">`;
    const newNoteInput=`<input type="text" id="noteInput" placeholder="Note (ex: r\u00e9union client, dev\u2026)" maxlength="60" oninput="onNoteInputChange()">`;
    if(nc.includes('id="noteInput"')){
      nc=nc.replace(oldNoteInput,newNoteInput);
      log('Note rapide: evenement oninput ajoute');
    } else {log('ATTENTION: noteInput non trouve','err');}

    // 5. Ajouter fonction onNoteInputChange
    const oldVersion=`const APP_VERSION = '0.1.42'`;
    const newVersion=`const APP_VERSION = '0.1.45'`;
    const fnNoteChange=`function onNoteInputChange(){\n  const val=document.getElementById('noteInput').value;\n  localStorage.setItem('orvia_note_en_cours',val);\n}\n`;
    if(nc.includes(oldVersion)){
      nc=nc.replace(oldVersion,fnNoteChange+newVersion);
      log('Fonction onNoteInputChange ajoutee, version 0.1.45');
    } else if(nc.includes("const APP_VERSION = '0.1.44'")){
      nc=nc.replace("const APP_VERSION = '0.1.44'",fnNoteChange+"const APP_VERSION = '0.1.45'");
      log('Fonction onNoteInputChange ajoutee, version 0.1.45');
    } else {log('ATTENTION: APP_VERSION non trouve','err');}

    // 6. Restaurer la note en cours au chargement (dans la fonction load())
    const oldLoad=`function load() {`;
    const newLoad=`function load() {\n  try { const n=localStorage.getItem('orvia_note_en_cours'); if(n!==null){const ni=document.getElementById('noteInput');if(ni)ni.value=n;} } catch(e){}`;
    if(nc.includes('function load() {')){
      nc=nc.replace(oldLoad,newLoad);
      log('Restauration note en cours au chargement');
    } else {log('ATTENTION: function load() non trouve','err');}

    log('Envoi vers GitHub...','info');
    const encoded=btoa(unescape(encodeURIComponent(nc)));
    const pr=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE,{
      method:'PUT',
      headers:{...headers,'Content-Type':'application/json'},
      body:JSON.stringify({message:'feat: edition note session + note rapide en cours v0.1.45',content:encoded,sha:d.sha})
    });
    const pd=await pr.json();
    if(pr.ok){log('Deploye avec succes! Orvia se met a jour dans 30 secondes.');}
    else{log('Erreur: '+JSON.stringify(pd.message),'err');}
  }catch(e){log('Erreur: '+e.message,'err');}
  document.getElementById('btn').disabled=false;
}
</script>
</body>
</html>
