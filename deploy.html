<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Orvia Deploy</title>
<style>
body{font-family:-apple-system,sans-serif;background:#0b1f2a;color:#e8eaf6;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;}
h1{font-size:24px;margin-bottom:8px;}
p{color:#8b8fa8;font-size:14px;margin-bottom:20px;text-align:center;}
input{background:#1a2f3f;border:1px solid #2a4f6f;color:#e8eaf6;padding:10px 16px;border-radius:8px;width:320px;font-size:13px;margin-bottom:12px;outline:none;}
button{background:#6c63ff;color:#fff;border:none;padding:16px 40px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;width:320px;}
button:disabled{opacity:.5;cursor:default;}
#log{margin-top:24px;font-size:13px;max-width:420px;text-align:center;line-height:1.6;}
.ok{color:#3ecf8e;}.err{color:#ff6584;}.info{color:#8b8fa8;}
label{color:#8b8fa8;font-size:12px;align-self:flex-start;margin-left:calc(50% - 160px);margin-bottom:4px;}
</style>
</head>
<body>
<h1>Orvia Deploy</h1>
<p>Declenche le workflow de deploiement<br>via GitHub Actions.</p>
<label>GitHub Token (stocke localement)</label>
<input id="tok" type="password" placeholder="ghp_... ou github_pat_..." />
<button id="btn" onclick="deploy()">Deployer sur Orvia</button>
<div id="log"></div>
<script>
const REPO='willOu/orvia-app';
const BASE='https://api.github.com/repos/'+REPO;
const WORKFLOW='deploy-manual.yml';

window.onload=function(){
  const saved=localStorage.getItem('orvia_token');
  if(saved) document.getElementById('tok').value=saved;
};

async function deploy(){
  const tok=document.getElementById('tok').value.trim();
  if(!tok){log('Veuillez saisir un token GitHub.','err');return;}
  localStorage.setItem('orvia_token',tok);
  document.getElementById('btn').disabled=true;
  const logEl=document.getElementById('log');
  logEl.innerHTML='';
  function log(msg,cls='info'){logEl.innerHTML+='<div class="'+cls+'">'+msg+'</div>';}
  log('Declenchement du workflow...');
  try{
    const r=await fetch(BASE+'/actions/workflows/'+WORKFLOW+'/dispatches',{
      method:'POST',
      headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json','Accept':'application/vnd.github+json'},
      body:JSON.stringify({ref:'main'})
    });
    if(r.status===204){
      log('Workflow lance avec succes !','ok');
      log('Rendez-vous sur GitHub Actions pour suivre le deploiement.');
    } else {
      const e=await r.text();
      log('Erreur '+r.status+': '+e,'err');
    }
  }catch(e){
    log('Erreur reseau: '+e,'err');
  }
  document.getElementById('btn').disabled=false;
}
</script>
</body>
</html>
