name: Deploy Orvia

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "deploy@orvia.app"
          git config user.name "Orvia Deploy"

      - name: Touch deploy timestamp
        run: |
          echo $(date -u) > .deploy-timestamp
          git add .deploy-timestamp
          git commit -m "chore: deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "Nothing to commit"
          git push
